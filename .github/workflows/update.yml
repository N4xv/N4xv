name: Update Profile SVG

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:           # manual trigger from GitHub UI
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate hero.svg with live data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Guard: don't fail the job if the generator didn't create hero.svg
          if [ ! -f hero.svg ]; then
            echo "hero.svg was not generated; skipping commit."
            exit 0
          fi

          git add hero.svg
          git diff --cached --quiet || git commit -m "chore: refresh profile [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
